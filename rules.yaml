version: 1

rules:
  - type: threshold
    probe_prefix: "ping:"
    warn_ms: 250
    crit_ms: 600

  - type: threshold
    probe_prefix: "http:"
    warn_ms: 800
    crit_ms: 1500


  - type: baseline
    probe_prefix: "http:"
    window_size: 50         
    method: "p90"           
    factor_warn: 1.8        
    factor_crit: 2.5        
    min_baseline_ms: 50     
